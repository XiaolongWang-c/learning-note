<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ResNet vs 普通深层网络模拟</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #f0f0f0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .control-panel { background: #2d2d2d; padding: 15px 30px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; gap: 30px; align-items: center; }
        .control-item { display: flex; flex-direction: column; gap: 5px; }
        canvas { background: #252526; border: 1px solid #444; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .canvas-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .panel { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        h1 { margin: 0 0 10px 0; font-size: 24px; color: #61afef; }
        .metric { font-size: 18px; font-weight: bold; color: #98c379; height: 25px; }
        button { background: #007acc; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #005999; }
        input[type=range] { width: 150px; }
    </style>
</head>
<body>

    <h1>深层网络优化迷局：ResNet 动画模拟</h1>
    
    <div class="control-panel">
        <div class="control-item">
            <label>网络类型</label>
            <button id="toggleNet" onclick="toggleNetwork()">当前: 普通深层网络</button>
        </div>
        <div class="control-item">
            <label>网络深度: <span id="depthVal">50</span> 层</label>
            <input type="range" id="depthSlider" min="10" max="100" value="50" oninput="updateDepth()">
        </div>
    </div>

    <div class="canvas-container">
        <div class="panel">
            <h3>正向信息流 (Forward Pass)</h3>
            <canvas id="forwardCanvas" width="400" height="600"></canvas>
            <div class="metric" id="forwardMetric">底部信息保留率: 100%</div>
        </div>
        <div class="panel">
            <h3>反向梯度流 (Backward Pass)</h3>
            <canvas id="backwardCanvas" width="400" height="600"></canvas>
            <div class="metric" id="backwardMetric">顶层梯度强度: 100%</div>
        </div>
    </div>

    <script>
        let isResNet = false;
        let depth = 50;
        const fCanvas = document.getElementById('forwardCanvas');
        const fCtx = fCanvas.getContext('2d');
        const bCanvas = document.getElementById('backwardCanvas');
        const bCtx = bCanvas.getContext('2d');

        let particles = { forward: [], backward: [] };
        let time = 0;

        function toggleNetwork() {
            isResNet = !isResNet;
            document.getElementById('toggleNet').innerText = isResNet ? "当前: ResNet (残差网络)" : "当前: 普通深层网络";
            document.getElementById('toggleNet').style.background = isResNet ? "#98c379" : "#d16969";
        }

        function updateDepth() {
            depth = document.getElementById('depthSlider').value;
            document.getElementById('depthVal').innerText = depth;
        }

        class Particle {
            constructor(type) {
                this.type = type; // 'forward' or 'backward'
                this.reset();
            }
            reset() {
                this.x = 200;
                this.y = this.type === 'forward' ? 50 : 550;
                this.speed = this.type === 'forward' ? 2.5 : -2.5;
                this.intensity = 1.0;
                this.active = true;
            }
            update() {
                if (!this.active) return;
                this.y += this.speed;

                // 模拟衰减 (每经过一段距离衰减一次)
                let progress = this.type === 'forward' ? (this.y - 50) / 500 : (550 - this.y) / 500;
                let currentLayer = Math.floor(progress * depth);

                if (!isResNet) {
                    // 普通网络：指数衰减 (模拟连乘效应)
                    this.intensity = Math.pow(0.92, currentLayer); 
                } else {
                    // ResNet：衰减极小 (模拟恒等映射和梯度高速公路)
                    this.intensity = Math.pow(0.995, currentLayer);
                }

                // 边界检测
                if ((this.type === 'forward' && this.y > 550) || (this.type === 'backward' && this.y < 50)) {
                    this.active = false;
                }
            }
            draw(ctx) {
                if (!this.active || this.intensity < 0.01) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6 * this.intensity + 2, 0, Math.PI * 2);
                let color = this.type === 'forward' ? `rgba(97, 175, 239, ${this.intensity})` : `rgba(224, 108, 117, ${this.intensity})`;
                ctx.fillStyle = color;
                ctx.shadowBlur = 10 * this.intensity;
                ctx.shadowColor = color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function spawnParticles() {
            if (time % 15 === 0) {
                let fp = particles.forward.find(p => !p.active);
                if (fp) fp.reset(); else particles.forward.push(new Particle('forward'));

                let bp = particles.backward.find(p => !p.active);
                if (bp) bp.reset(); else particles.backward.push(new Particle('backward'));
            }
        }

        function drawNetworkStructure(ctx) {
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(200, 50);
            ctx.lineTo(200, 550);
            ctx.stroke();

            // 画层 (灰色方块)
            let layerSpacing = 500 / depth;
            for (let i = 0; i <= depth; i++) {
                let y = 50 + i * layerSpacing;
                ctx.fillStyle = '#3e3e42';
                ctx.fillRect(170, y - 2, 60, 4);
                
                // 画 ResNet 的跳跃连接 (弧线)
                if (isResNet && i % 2 === 0 && i < depth) {
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(152, 195, 121, 0.4)'; // 绿色高速公路
                    ctx.lineWidth = 2;
                    ctx.moveTo(230, y);
                    ctx.quadraticCurveTo(300, y + layerSpacing, 230, y + layerSpacing * 2);
                    ctx.stroke();
                }
            }
        }

        function updateMetrics() {
            let finalDecayPlain = Math.pow(0.92, depth);
            let finalDecayRes = Math.pow(0.995, depth);
            let val = isResNet ? finalDecayRes : finalDecayPlain;
            
            let percent = (val * 100).toFixed(2);
            if (val < 0.01) percent = "~0.00"; // 梯度消失

            document.getElementById('forwardMetric').innerText = `底部信息保留率: ${percent}%`;
            document.getElementById('backwardMetric').innerText = `顶层梯度强度: ${percent}%`;
            
            let color = val > 0.5 ? '#98c379' : (val > 0.1 ? '#e5c07b' : '#e06c75');
            document.getElementById('forwardMetric').style.color = color;
            document.getElementById('backwardMetric').style.color = color;
        }

        function animate() {
            fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
            bCtx.clearRect(0, 0, bCanvas.width, bCanvas.height);

            drawNetworkStructure(fCtx);
            drawNetworkStructure(bCtx);

            spawnParticles();

            particles.forward.forEach(p => { p.update(); p.draw(fCtx); });
            particles.backward.forEach(p => { p.update(); p.draw(bCtx); });

            updateMetrics();

            time++;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
